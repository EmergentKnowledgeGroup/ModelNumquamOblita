<polyline points="1420.0,363.3 1392.0,363.3 1392.0,368.0 1360.0,368.0 1360.0,304.0 496.0,304.0 496.0,352.0 492.0,352.2 520.0,352.2" fill="none" stroke="#6c8ebf" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
