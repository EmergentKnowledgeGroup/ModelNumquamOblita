<g class="node-label"><text x="590.0" y="206.2" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#1f2937">Structured live schedule</text><text x="590.0" y="223.3" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#1f2937">source-backed, durable SQLite, auth +</text><text x="590.0" y="240.5" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#1f2937">idempotency</text><text x="590.0" y="257.7" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#1f2937">raw import cannot schedule</text></g>
