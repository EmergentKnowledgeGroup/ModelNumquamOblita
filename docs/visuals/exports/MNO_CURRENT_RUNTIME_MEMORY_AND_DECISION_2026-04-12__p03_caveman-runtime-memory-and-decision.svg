<polyline points="520.0,374.4 492.0,374.4 496.0,368.0 48.0,368.0 42.0,363.3 70.0,363.3" fill="none" stroke="#6c8ebf" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
<rect x="70.0" y="70.0" width="360.0" height="98.1" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="124.8"><tspan x="250.0" dy="0.0">1. Someone asks MNO for memory help.</tspan></text>
<rect x="520.0" y="70.0" width="360.0" height="98.1" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="116.5"><tspan x="700.0" dy="0.0">2. MNO checks the short-term chat stuff first.</tspan><tspan x="700.0" dy="16.5">STM = short-term memory for this session.</tspan></text>
<rect x="970.0" y="70.0" width="360.0" height="98.1" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="108.3"><tspan x="1150.0" dy="0.0">3. MNO checks truth, evidence, then helper notes.</tspan><tspan x="1150.0" dy="16.5">Reviewed truth wins. A scratchpad cannot prove</tspan><tspan x="1150.0" dy="16.5">anything.</tspan></text>
<rect x="1420.0" y="70.0" width="360.0" height="98.1" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1600.0" y="116.5"><tspan x="1600.0" dy="0.0">4. ANN helps find nearby candidates.</tspan><tspan x="1600.0" dy="16.5">ANN = approximate nearest neighbor.</tspan></text>
<rect x="1420.0" y="323.1" width="360.0" height="80.4" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1600.0" y="360.8"><tspan x="1600.0" dy="0.0">5. If you ask for exact wording, MNO can open the</tspan><tspan x="1600.0" dy="16.5">wording receipt lane.</tspan></text>
<rect x="970.0" y="323.1" width="360.0" height="80.4" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="360.8"><tspan x="1150.0" dy="0.0">6. If old and corrected reviewed cards exist, MNO</tspan><tspan x="1150.0" dy="16.5">prefers the current reviewed one.</tspan></text>
<rect x="520.0" y="323.1" width="360.0" height="80.4" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="360.8"><tspan x="700.0" dy="0.0">7. MNO builds a bounded evidence bundle, not a</tspan><tspan x="700.0" dy="16.5">giant raw dump.</tspan></text>
<rect x="70.0" y="323.1" width="360.0" height="80.4" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="369.0"><tspan x="250.0" dy="0.0">8. MNO answers, abstains, or asks you to clarify.</tspan></text>
<rect x="70.0" y="558.5" width="360.0" height="133.5" rx="12" fill="#fce5f1" stroke="#b8549e" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="622.7"><tspan x="250.0" dy="0.0">9. New risky memory still goes to proposal/review,</tspan><tspan x="250.0" dy="16.5">not straight to truth.</tspan></text>
<rect x="520.0" y="558.5" width="360.0" height="133.5" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="598.0"><tspan x="700.0" dy="0.0">Words to know</tspan><tspan x="700.0" dy="16.5">MCP = Model Context Protocol</tspan><tspan x="700.0" dy="16.5">ANN = approximate nearest neighbor</tspan><tspan x="700.0" dy="16.5">STM = short-term memory</tspan><tspan x="700.0" dy="16.5">WSS = work-session scratchpad</tspan></text>
<polygon points="250.0,692.0 255.3,702.8 244.7,702.8" fill="#6c8ebf"/>
