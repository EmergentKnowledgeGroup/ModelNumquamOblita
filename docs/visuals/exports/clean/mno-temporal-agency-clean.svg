<rect x="85" y="175" width="285" height="100" rx="9" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text x="227.5" y="209.5" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#1f2933"><tspan x="227.5" dy="0.0">Each turn: server clock facts</tspan><tspan x="227.5" dy="22.3">UTC/local time, IANA timezone,</tspan><tspan x="227.5" dy="22.3">prior-turn provenance</tspan></text>
<rect x="85" y="420" width="285" height="90" rx="9" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text x="227.5" y="450.4" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="500" fill="#1f2933"><tspan x="227.5" dy="0.0">Neutral context only</tspan><tspan x="227.5" dy="21.1">facts and opaque IDs, never</tspan><tspan x="227.5" dy="21.1">instructions</tspan></text>
<rect x="525" y="150" width="285" height="110" rx="9" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text x="667.5" y="179.8" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="500" fill="#1f2933"><tspan x="667.5" dy="0.0">Live structured schedule</tspan><tspan x="667.5" dy="21.1">source-backed, authenticated,</tspan><tspan x="667.5" dy="21.1">durable; raw import cannot</tspan><tspan x="667.5" dy="21.1">schedule</tspan></text>
<rect x="525" y="365" width="285" height="120" rx="9" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text x="667.5" y="398.4" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#1f2933"><tspan x="667.5" dy="0.0">Four separate labels</tspan><tspan x="667.5" dy="22.3">authority • maturity • lifecycle •</tspan><tspan x="667.5" dy="22.3">temporal state</tspan><tspan x="667.5" dy="22.3">active → dormant → archived</tspan></text>
<rect x="525" y="570" width="285" height="85" rx="9" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
<text x="667.5" y="598.7" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#1f2933"><tspan x="667.5" dy="0.0">Only new signed evidence</tspan><tspan x="667.5" dy="19.8">may reinforce/reactivate</tspan><tspan x="667.5" dy="19.8">recall and delivery do not</tspan></text>
<rect x="965" y="150" width="285" height="120" rx="9" fill="#eadcf8" stroke="#9673b9" stroke-width="2"/>
<text x="1107.5" y="183.4" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#1f2933"><tspan x="1107.5" dy="0.0">Bounded due context</tspan><tspan x="1107.5" dy="22.3">canonical corrections first, due</tspan><tspan x="1107.5" dy="22.3">provisional notes next,</tspan><tspan x="1107.5" dy="22.3">cue-aware dormant fallback last</tspan></text>
<rect x="965" y="400" width="285" height="100" rx="9" fill="#eadcf8" stroke="#9673b9" stroke-width="2"/>
<text x="1107.5" y="427.8" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#1f2933"><tspan x="1107.5" dy="0.0">Optional heartbeat poll</tspan><tspan x="1107.5" dy="18.6">due_only=true, upcoming=false,</tspan><tspan x="1107.5" dy="18.6">limit=3</tspan><tspan x="1107.5" dy="18.6">read-only</tspan></text>
<rect x="405" y="790" width="520" height="82" rx="9" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
<text x="665.0" y="837.1" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#1f2933"><tspan x="665.0" dy="0.0">Never a daemon, wake-up, notification, or action runner</tspan></text>
<rect x="310" y="930" width="730" height="70" rx="9" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
<text x="675.0" y="971.1" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#1f2933"><tspan x="675.0" dy="0.0">Temporal facts help a host decide what to do. MNO itself does not decide or act.</tspan></text>
