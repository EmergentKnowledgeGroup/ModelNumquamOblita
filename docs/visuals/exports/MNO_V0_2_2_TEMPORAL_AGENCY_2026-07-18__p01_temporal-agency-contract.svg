<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="257.0" y="328.1"><tspan x="257.0" dy="0.0">agent_context_v2 temporal envelope</tspan><tspan x="257.0" dy="16.5">bounded neutral facts; opaque expansion IDs</tspan><tspan x="257.0" dy="16.5">never behavioral instructions</tspan></text>
<rect x="592.0" y="124.0" width="342.0" height="102.6" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="763.0" y="164.5"><tspan x="763.0" dy="0.0">Live source-backed structured schedule</tspan><tspan x="763.0" dy="16.5">durable SQLite + auth + idempotency</tspan><tspan x="763.0" dy="16.5">raw import = evidence ingest only</tspan></text>
<rect x="592.0" y="268.6" width="342.0" height="121.5" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="763.0" y="310.4"><tspan x="763.0" dy="0.0">Four independent axes</tspan><tspan x="763.0" dy="16.5">authority | maturity | lifecycle | disposition</tspan><tspan x="763.0" dy="16.5">active → dormant → archived</tspan><tspan x="763.0" dy="16.5">scheduled / snoozed / terminal</tspan></text>
<rect x="592.0" y="432.2" width="342.0" height="121.5" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="763.0" y="473.9"><tspan x="763.0" dy="0.0">Decay hold</tspan><tspan x="763.0" dy="16.5">pending/snoozed protected until</tspan><tspan x="763.0" dy="16.5">decay_not_before_utc</tspan><tspan x="763.0" dy="16.5">read, delivery, repetition ≠ evidence</tspan></text>
<rect x="592.0" y="595.7" width="342.0" height="102.6" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="763.0" y="636.2"><tspan x="763.0" dy="0.0">Only new eligible signed evidence</tspan><tspan x="763.0" dy="16.5">may reinforce or reactivate</tspan><tspan x="763.0" dy="16.5">dormant/archived record</tspan></text>
<rect x="1098.0" y="124.0" width="342.0" height="102.6" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1269.0" y="164.5"><tspan x="1269.0" dy="0.0">Deterministic due selection</tspan><tspan x="1269.0" dy="16.5">overdue → due; scope-filtered</tspan><tspan x="1269.0" dy="16.5">can run without lexical hit</tspan></text>
<rect x="1098.0" y="268.6" width="342.0" height="140.4" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1269.0" y="311.5"><tspan x="1269.0" dy="0.0">Context priority</tspan><tspan x="1269.0" dy="16.5">1 canonical correction / reviewed facts</tspan><tspan x="1269.0" dy="16.5">2 due provisional notes</tspan><tspan x="1269.0" dy="16.5">3 cue-aware dormant fallback</tspan><tspan x="1269.0" dy="16.5">archived = history/deep read</tspan></text>
