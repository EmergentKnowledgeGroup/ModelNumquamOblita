<polyline points="302.7,593.9 302.7,565.9 304.0,560.0 304.0,320.0 302.7,312.8 302.7,340.8" fill="none" stroke="#6b7280" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
<rect x="70.0" y="70.0" width="360.0" height="115.8" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="125.4"><tspan x="250.0" dy="0.0">1. Give MNO your chats, files, folders, or an existing</tspan><tspan x="250.0" dy="16.5">store.</tspan></text>
<rect x="520.0" y="70.0" width="360.0" height="115.8" rx="12" fill="#fde9d9" stroke="#c97b63" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="108.9"><tspan x="700.0" dy="0.0">2. MNO cleans the pile and keeps a wording</tspan><tspan x="700.0" dy="16.5">receipt.</tspan><tspan x="700.0" dy="16.5">Receipt = the original cleaned wording for quote</tspan><tspan x="700.0" dy="16.5">checks.</tspan></text>
<rect x="970.0" y="70.0" width="360.0" height="115.8" rx="12" fill="#fde9d9" stroke="#c97b63" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="117.1"><tspan x="1150.0" dy="0.0">3. MNO makes atoms.</tspan><tspan x="1150.0" dy="16.5">Atoms = small evidence pieces, not final truth by</tspan><tspan x="1150.0" dy="16.5">themselves.</tspan></text>
<rect x="1420.0" y="70.0" width="360.0" height="115.8" rx="12" fill="#fde9d9" stroke="#c97b63" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1600.0" y="125.4"><tspan x="1600.0" dy="0.0">4. MNO makes draft story cards.</tspan><tspan x="1600.0" dy="16.5">Draft = rough memory cards, still editable.</tspan></text>
<rect x="1420.0" y="340.8" width="360.0" height="98.1" rx="12" fill="#fce5f1" stroke="#b8549e" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1600.0" y="387.3"><tspan x="1600.0" dy="0.0">5. Assistant/agent can help clean the draft, but it</tspan><tspan x="1600.0" dy="16.5">stays draft-only.</tspan></text>
<rect x="970.0" y="340.8" width="360.0" height="98.1" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="395.6"><tspan x="1150.0" dy="0.0">6. Human decides what becomes trusted memory.</tspan></text>
<rect x="520.0" y="340.8" width="360.0" height="98.1" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="379.1"><tspan x="700.0" dy="0.0">7. Reviewed cards stay linked when one corrects</tspan><tspan x="700.0" dy="16.5">another.</tspan><tspan x="700.0" dy="16.5">That is truth lineage.</tspan></text>
<rect x="70.0" y="340.8" width="360.0" height="98.1" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="395.6"><tspan x="250.0" dy="0.0">8. At runtime, MNO uses trusted memory first.</tspan></text>
<rect x="70.0" y="593.9" width="360.0" height="115.8" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="649.3"><tspan x="250.0" dy="0.0">9. If you ask for exact wording, MNO can open the</tspan><tspan x="250.0" dy="16.5">wording receipt lane.</tspan></text>
<rect x="520.0" y="593.9" width="360.0" height="115.8" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="649.3"><tspan x="700.0" dy="0.0">10. MNO answers, abstains, or asks you to clarify</tspan><tspan x="700.0" dy="16.5">instead of bluffing.</tspan></text>
<rect x="970.0" y="593.9" width="360.0" height="115.8" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="632.8"><tspan x="1150.0" dy="0.0">Words to know</tspan><tspan x="1150.0" dy="16.5">MCP = Model Context Protocol</tspan><tspan x="1150.0" dy="16.5">ANN = approximate nearest neighbor</tspan><tspan x="1150.0" dy="16.5">WSS = work-session scratchpad</tspan></text>
