<polygon points="970.0,355.9 959.2,361.2 959.2,350.6" fill="#82b366"/>
<polygon points="520.0,352.2 509.2,357.5 509.2,346.9" fill="#6c8ebf"/>
<polygon points="520.0,363.3 509.2,368.6 509.2,358.0" fill="#6c8ebf"/>
<polygon points="70.0,363.3 59.2,368.6 59.2,358.0" fill="#6c8ebf"/>
