<polyline points="1420.0,345.6 1392.0,345.6 1392.0,416.0 496.0,416.0 496.0,336.0 492.0,334.5 520.0,334.5" fill="none" stroke="#6c8ebf" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
<polyline points="970.0,353.0 942.0,353.0 944.0,352.0 496.0,352.0 492.0,345.6 520.0,345.6" fill="none" stroke="#6c8ebf" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
<polyline points="520.0,356.7 492.0,356.7 496.0,352.0 48.0,352.0 42.0,345.6 70.0,345.6" fill="none" stroke="#6c8ebf" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
<rect x="70.0" y="70.0" width="360.0" height="80.4" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="115.9"><tspan x="250.0" dy="0.0">1. Agent or user asks MNO for memory help.</tspan></text>
<rect x="520.0" y="70.0" width="360.0" height="80.4" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="115.9"><tspan x="700.0" dy="0.0">2. MNO checks the short-term chat first.</tspan></text>
<rect x="970.0" y="70.0" width="360.0" height="80.4" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="115.9"><tspan x="1150.0" dy="0.0">3. MNO checks trusted memory and evidence.</tspan></text>
<rect x="1420.0" y="70.0" width="360.0" height="80.4" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1600.0" y="107.7"><tspan x="1600.0" dy="0.0">4. ANN helps find nearby candidates.</tspan><tspan x="1600.0" dy="16.5">ANN = approximate nearest neighbor.</tspan></text>
<rect x="1420.0" y="305.4" width="360.0" height="80.4" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1600.0" y="343.1"><tspan x="1600.0" dy="0.0">5. If you ask for exact wording, MNO can open the</tspan><tspan x="1600.0" dy="16.5">wording receipt lane.</tspan></text>
<rect x="970.0" y="305.4" width="360.0" height="80.4" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="343.1"><tspan x="1150.0" dy="0.0">6. If truth changed, MNO can tell old reviewed</tspan><tspan x="1150.0" dy="16.5">cards from current reviewed cards.</tspan></text>
<rect x="520.0" y="305.4" width="360.0" height="80.4" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="343.1"><tspan x="700.0" dy="0.0">7. MNO builds a bounded evidence bundle, then</tspan><tspan x="700.0" dy="16.5">answers, abstains, or asks to clarify.</tspan></text>
<rect x="70.0" y="305.4" width="360.0" height="80.4" rx="12" fill="#fce5f1" stroke="#b8549e" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="343.1"><tspan x="250.0" dy="0.0">8. New risky memory still goes to proposal/review,</tspan><tspan x="250.0" dy="16.5">not straight into truth.</tspan></text>
<rect x="70.0" y="540.8" width="360.0" height="115.8" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="579.7"><tspan x="250.0" dy="0.0">Words to know</tspan><tspan x="250.0" dy="16.5">MCP = Model Context Protocol</tspan><tspan x="250.0" dy="16.5">STM = short-term memory</tspan><tspan x="250.0" dy="16.5">ANN = approximate nearest neighbor</tspan></text>
