<polyline points="520.0,353.0 492.0,353.0 496.0,352.0 48.0,352.0 42.0,345.6 70.0,345.6" fill="none" stroke="#82b366" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
<polyline points="250.0,385.8 250.0,413.8 256.0,416.0 256.0,672.0 250.0,666.9 250.0,638.9" fill="none" stroke="#82b366" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
<rect x="70.0" y="70.0" width="360.0" height="80.4" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="115.9"><tspan x="250.0" dy="0.0">1. Click the starter file or open the app.</tspan></text>
<rect x="520.0" y="70.0" width="360.0" height="80.4" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="107.7"><tspan x="700.0" dy="0.0">2. Pick files, folders, or an existing store.</tspan><tspan x="700.0" dy="16.5">You can mix folders and single files.</tspan></text>
<rect x="970.0" y="70.0" width="360.0" height="80.4" rx="12" fill="#fde9d9" stroke="#c97b63" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="107.7"><tspan x="1150.0" dy="0.0">3. MNO cleans the pile and makes atoms.</tspan><tspan x="1150.0" dy="16.5">Atoms = small evidence pieces.</tspan></text>
<rect x="1420.0" y="70.0" width="360.0" height="80.4" rx="12" fill="#fde9d9" stroke="#c97b63" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1600.0" y="107.7"><tspan x="1600.0" dy="0.0">4. MNO also keeps a wording receipt for quote</tspan><tspan x="1600.0" dy="16.5">checks.</tspan></text>
<rect x="1420.0" y="305.4" width="360.0" height="80.4" rx="12" fill="#fde9d9" stroke="#c97b63" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1600.0" y="343.1"><tspan x="1600.0" dy="0.0">5. MNO builds rough story cards.</tspan><tspan x="1600.0" dy="16.5">Rough = draft, not trusted yet.</tspan></text>
<rect x="970.0" y="305.4" width="360.0" height="80.4" rx="12" fill="#fce5f1" stroke="#b8549e" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="1150.0" y="343.1"><tspan x="1150.0" dy="0.0">6. Assistant/agent can help clean the draft, but it</tspan><tspan x="1150.0" dy="16.5">stays draft-only.</tspan></text>
<rect x="520.0" y="305.4" width="360.0" height="80.4" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="351.3"><tspan x="700.0" dy="0.0">7. Human decides what becomes trusted memory.</tspan></text>
<rect x="70.0" y="305.4" width="360.0" height="80.4" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="343.1"><tspan x="250.0" dy="0.0">8. Corrected reviewed cards stay linked so old vs</tspan><tspan x="250.0" dy="16.5">current truth is clearer.</tspan></text>
<rect x="70.0" y="540.8" width="360.0" height="98.1" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="250.0" y="595.6"><tspan x="250.0" dy="0.0">9. Reviewed memory goes live in the runtime.</tspan></text>
<rect x="520.0" y="540.8" width="360.0" height="98.1" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
<text text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#1f2933" x="700.0" y="579.1"><tspan x="700.0" dy="0.0">Words to know</tspan><tspan x="700.0" dy="16.5">MCP = Model Context Protocol</tspan><tspan x="700.0" dy="16.5">ANN = approximate nearest neighbor</tspan></text>
<polygon points="880.0,102.8 890.8,97.5 890.8,108.1" fill="#d6b656"/>
