name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/desktop/package-lock.json
      - name: Install desktop dependencies for packaged smoke
        if: matrix.os == 'ubuntu-latest'
        run: npm ci --prefix app/desktop
      - name: Install
        run: python -m pip install --upgrade pip pytest && python -m pip install -e .
      - name: Test
        run: python -m pytest
        env:
          # GitHub's unprivileged runner cannot provide Chromium's root-owned SUID helper.
          # This affects only the real Electron boot smokes executed by the test harness.
          MNO_ELECTRON_TEST_NO_SANDBOX: ${{ matrix.os == 'ubuntu-latest' && '1' || '0' }}

  desktop:
    name: Desktop tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/desktop/package-lock.json
      - name: Install desktop dependencies
        run: npm ci --prefix app/desktop
      - name: Test desktop shell
        run: npm run desktop:test --prefix app/desktop
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify v0.2.1 metadata is aligned
        shell: python
        run: |
          import json
          import pathlib
          import tomllib

          root = pathlib.Path.cwd()
          project = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          desktop = json.loads((root / "app/desktop/package.json").read_text(encoding="utf-8"))
          lock = json.loads((root / "app/desktop/package-lock.json").read_text(encoding="utf-8"))
          manifest = json.loads((root / "app/desktop/runtime-bundle.manifest.json").read_text(encoding="utf-8"))
          expected = "0.2.1"
          assert project["project"]["version"] == expected
          assert desktop["version"] == expected
          assert lock["version"] == expected
          assert expected in manifest["allowed_app_versions"]

  distribution-artifacts:
    name: Build and prove release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build exact wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build --outdir dist
      - name: Verify manifests and isolated install
        run: python tools/verify_distribution_artifacts.py --dist-dir dist --work-root artifact-proof
      - name: Record release digests
        shell: python
        run: |
          import hashlib
          import json
          import pathlib

          rows = []
          for path in sorted(pathlib.Path("dist").iterdir()):
              if path.is_file():
                  rows.append({"name": path.name, "sha256": hashlib.sha256(path.read_bytes()).hexdigest()})
          pathlib.Path("dist/SHA256SUMS.json").write_text(json.dumps(rows, indent=2) + "\n", encoding="utf-8")
      - uses: actions/upload-artifact@v4
        with:
          name: modelnumquamoblita-v0.2.1-python
          path: dist/*
          if-no-files-found: error
