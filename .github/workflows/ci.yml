name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip pytest && python -m pip install -e .
      - name: Test
        run: python -m pytest

  desktop:
    name: Desktop tests and release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/desktop/package-lock.json
      - name: Install desktop dependencies
        run: npm ci --prefix app/desktop
      - name: Test desktop shell
        run: npm run desktop:test --prefix app/desktop
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify v0.2.0 metadata is aligned
        shell: python
        run: |
          import json
          import pathlib
          import tomllib

          root = pathlib.Path.cwd()
          project = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          desktop = json.loads((root / "app/desktop/package.json").read_text(encoding="utf-8"))
          lock = json.loads((root / "app/desktop/package-lock.json").read_text(encoding="utf-8"))
          manifest = json.loads((root / "app/desktop/runtime-bundle.manifest.json").read_text(encoding="utf-8"))
          expected = "0.2.0"
          assert project["project"]["version"] == expected
          assert desktop["version"] == expected
          assert lock["version"] == expected
          assert expected in manifest["allowed_app_versions"]
